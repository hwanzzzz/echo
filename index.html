<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>강서구 노포 맛집 — 오래 살아남은 맛이 강한 맛이다</title>
<meta name="description" content="강서구에서 30년 이상 살아남은 노포 맛집 288곳. 내 위치에서 가까운 오래된 맛집을 찾아보세요.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Noto+Serif+KR:wght@700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#FAFAF7;--card:#fff;--text:#1a1a1a;--sub:#6b6b6b;--muted:#999;
  --accent:#B8860B;--accent-light:#F5E6C8;--accent-dark:#8B6508;
  --border:#e8e4dc;--shadow:0 2px 12px rgba(0,0,0,.06);
  --radius:14px;--serif:'Noto Serif KR',serif;--sans:'Noto Sans KR',sans-serif;
}
html{scroll-behavior:smooth}
body{font-family:var(--sans);background:var(--bg);color:var(--text);line-height:1.6;-webkit-font-smoothing:antialiased}

/* HERO */
.hero{
  position:relative;text-align:center;padding:56px 20px 40px;
  background:linear-gradient(180deg,#F7F3EB 0%,var(--bg) 100%);
  border-bottom:1px solid var(--border);
}
.hero-badge{
  display:inline-block;font-size:11px;font-weight:500;letter-spacing:.5px;
  color:var(--accent-dark);background:var(--accent-light);
  padding:5px 14px;border-radius:20px;margin-bottom:16px;
}
.hero h1{
  font-family:var(--serif);font-size:clamp(24px,5vw,36px);font-weight:900;
  line-height:1.35;color:var(--text);margin-bottom:8px;
}
.hero-sub{font-size:14px;color:var(--sub);margin-bottom:28px}
.hero-stats{
  display:flex;justify-content:center;gap:32px;margin-bottom:28px;
  font-size:13px;color:var(--muted);
}
.hero-stats strong{display:block;font-size:22px;font-weight:700;color:var(--text);font-family:var(--serif)}

/* LOCATE BUTTON */
.locate-btn{
  display:inline-flex;align-items:center;gap:8px;
  background:var(--text);color:#fff;border:none;
  padding:14px 32px;border-radius:50px;font-size:15px;font-weight:500;
  cursor:pointer;transition:all .2s;font-family:var(--sans);
  box-shadow:0 4px 20px rgba(0,0,0,.15);
}
.locate-btn:hover{transform:translateY(-1px);box-shadow:0 6px 24px rgba(0,0,0,.2)}
.locate-btn:active{transform:translateY(0)}
.locate-btn svg{width:18px;height:18px}
.locate-btn.loading{opacity:.7;pointer-events:none}

/* DISCOVERY BANNER */
.discovery{
  display:none;margin:0 auto;max-width:600px;padding:20px;
  text-align:center;animation:slideUp .5s ease;
}
.discovery.show{display:block}
.discovery-card{
  background:linear-gradient(135deg,#FFF9EE,#FFF5E0);
  border:1px solid var(--accent-light);border-radius:var(--radius);
  padding:20px 24px;
}
.discovery-emoji{font-size:28px;margin-bottom:8px}
.discovery-text{font-size:15px;font-weight:500;color:var(--accent-dark);line-height:1.5}
.discovery-text strong{font-weight:700;font-size:17px}

/* FILTERS */
.filters{
  position:sticky;top:0;z-index:100;background:var(--bg);
  border-bottom:1px solid var(--border);
  padding:12px 20px;
  transition:box-shadow .2s;
}
.filters.scrolled{box-shadow:0 2px 12px rgba(0,0,0,.08)}
.filters-inner{max-width:720px;margin:0 auto}
.filter-row{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch;padding-bottom:4px}
.filter-row::-webkit-scrollbar{display:none}
.filter-chip{
  flex-shrink:0;padding:7px 16px;border-radius:20px;font-size:13px;
  border:1px solid var(--border);background:var(--card);color:var(--sub);
  cursor:pointer;transition:all .15s;white-space:nowrap;font-family:var(--sans);
}
.filter-chip:hover{border-color:var(--accent)}
.filter-chip.active{background:var(--text);color:#fff;border-color:var(--text)}
.filter-row-label{font-size:11px;color:var(--muted);margin-bottom:6px;font-weight:500;letter-spacing:.5px}
.search-wrap{position:relative;margin-bottom:10px}
.search-wrap input{
  width:100%;padding:10px 16px 10px 38px;border:1px solid var(--border);
  border-radius:10px;font-size:14px;background:var(--card);
  font-family:var(--sans);outline:none;transition:border .2s;
}
.search-wrap input:focus{border-color:var(--accent)}
.search-wrap svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted);width:16px;height:16px}

/* RESULTS */
.results{max-width:720px;margin:0 auto;padding:16px 20px 100px}
.results-header{
  display:flex;justify-content:space-between;align-items:center;
  margin-bottom:16px;font-size:13px;color:var(--muted);
}
.results-count span{font-weight:700;color:var(--text)}
.sort-select{
  font-size:13px;padding:4px 8px;border:1px solid var(--border);
  border-radius:8px;background:var(--card);color:var(--text);
  font-family:var(--sans);cursor:pointer;
}

/* STORE CARDS */
.store-card{
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--radius);padding:18px 20px;margin-bottom:12px;
  cursor:pointer;transition:all .2s;position:relative;
}
.store-card:hover{border-color:var(--accent);box-shadow:var(--shadow)}
.store-card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
.store-name{font-size:17px;font-weight:700;color:var(--text)}
.store-years{
  flex-shrink:0;background:var(--accent-light);color:var(--accent-dark);
  font-size:12px;font-weight:700;padding:3px 10px;border-radius:12px;
  font-family:var(--serif);
}
.store-meta{display:flex;flex-wrap:wrap;gap:6px 14px;font-size:13px;color:var(--sub);margin-bottom:8px}
.store-meta-item{display:flex;align-items:center;gap:4px}
.store-meta-item svg{width:13px;height:13px;flex-shrink:0;opacity:.5}
.store-since{font-size:12px;color:var(--muted);font-style:italic}
.store-distance{
  font-size:13px;font-weight:600;color:var(--accent-dark);
  margin-top:8px;display:none;
}
.store-distance.show{display:flex;align-items:center;gap:4px}
.store-actions{display:flex;gap:8px;margin-top:10px}
.store-action-btn{
  padding:6px 14px;border-radius:8px;font-size:12px;font-weight:500;
  border:1px solid var(--border);background:var(--card);color:var(--sub);
  cursor:pointer;transition:all .15s;font-family:var(--sans);text-decoration:none;
}
.store-action-btn:hover{border-color:var(--accent);color:var(--accent-dark)}
.store-action-btn.primary{background:var(--text);color:#fff;border-color:var(--text)}
.store-action-btn.primary:hover{background:#333}

/* EMPTY */
.empty{text-align:center;padding:60px 20px;color:var(--muted)}
.empty-icon{font-size:40px;margin-bottom:12px;opacity:.4}
.empty-text{font-size:15px}

/* SCROLL TO TOP */
.scroll-top{
  position:fixed;bottom:24px;right:24px;width:44px;height:44px;
  border-radius:50%;background:var(--text);color:#fff;border:none;
  cursor:pointer;font-size:18px;display:none;z-index:200;
  box-shadow:0 4px 16px rgba(0,0,0,.2);transition:all .2s;
}
.scroll-top.show{display:flex;align-items:center;justify-content:center}

/* FOOTER */
.footer{
  text-align:center;padding:40px 20px;font-size:12px;color:var(--muted);
  border-top:1px solid var(--border);
}

/* ANIMATIONS */
@keyframes slideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.card-enter{animation:slideUp .35s ease both}

/* RESPONSIVE */
@media(max-width:480px){
  .hero{padding:40px 16px 32px}
  .hero-stats{gap:20px}
  .results{padding:12px 16px 100px}
  .store-card{padding:14px 16px}
}
</style>
</head>
<body>

<!-- HERO -->
<section class="hero">
  <div class="hero-badge">강서구 노포 맛집 지도</div>
  <h1>오래 살아남은 맛이<br>강한 맛이다.</h1>
  <p class="hero-sub">30년 이상 같은 자리를 지켜온 강서구 맛집의 기록</p>
  <div class="hero-stats">
    <div><strong id="stat-total">288</strong>노포</div>
    <div><strong>30년+</strong>업력</div>
    <div><strong>10</strong>동네</div>
  </div>
  <button class="locate-btn" id="locateBtn" onclick="getLocation()">

  <div class="discovery" id="discovery">

      <div class="discovery-emoji">📍</div>
      <div class="discovery-text" id="discoveryText"></div>
    </div>
  </div>
</section>

<!-- FILTERS -->
<section class="filters" id="filters">
  <div class="filters-inner">

</section>

<!-- RESULTS -->
<section class="results">

      <option value="years">업력순</option>
      <option value="name">이름순</option>
      <option value="distance">거리순</option>
    </select>
  </div>
  <div id="storeList"></div>
</section>

<button class="scroll-top" id="scrollTop" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>

<footer class="footer">
  오래 살아남은 맛이 강한 맛이다 © 2026<br>

  데이터는 참고용이며, 방문 전 확인을 권장합니다.
</footer>

":"마곡동","c":"한식","y":1996,"yr":30,"p":"02-2666-2669","lt":37.568903,"ln":126.831293},{"i":288,"n":"이태리부대찌개 발산점","a":"서울특별시 강서구 마곡중앙6로 66, 퀸즈파크텐 B동 B103호 (마곡동)","d":"마곡동","c":"한식","y":1996,"yr":30,"p":"02-6411-9111","lt":37.56612,"ln":126.830349}];

// State
let userLat=null,userLng=null,activeDong='전체',activeCat='전체',searchQuery='';

// Init
const dongs=['전체','화곡동','방화동','등촌동','염창동','공항동','가양동','마곡동','내발산동','외발산동','개화동'];
const cats=['전체','한식','분식','중식','일식','경양식','치킨','호프/치킨','고기','횟집','주점','카페','기타'];

function initFilters(){
  const df=document.getElementById('dongFilters');
  const cf=document.getElementById('catFilters');
  dongs.forEach(d=>{
    const chip=document.createElement('button');
    chip.className='filter-chip'+(d==='전체'?' active':'');
    chip.textContent=d;
    chip.onclick=()=>{activeDong=d;df.querySelectorAll('.filter-chip').forEach(c=>c.classList.remove('active'));chip.classList.add('active');renderStores()};
    df.appendChild(chip);
  });
  cats.forEach(c=>{
    const chip=document.createElement('button');
    chip.className='filter-chip'+(c==='전체'?' active':'');
    chip.textContent=c;
    chip.onclick=()=>{activeCat=c;cf.querySelectorAll('.filter-chip').forEach(b=>b.classList.remove('active'));chip.classList.add('active');renderStores()};
    cf.appendChild(chip);
  });
}

function haversine(lat1,lon1,lat2,lon2){
  const R=6371000;
  const dLat=(lat2-lat1)*Math.PI/180;
  const dLon=(lon2-lon1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

function distStr(m){
  if(m<1000)return Math.round(m)+'m';
  return (m/1000).toFixed(1)+'km';
}

function walkMin(m){return Math.max(1,Math.round(m/67))}

function getLocation(){
  const btn=document.getElementById('locateBtn');
  btn.classList.add('loading');
  btn.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="animation:spin 1s linear infinite"><circle cx="12" cy="12" r="3"/><path d="M12 2v4m0 12v4M2 12h4m12 0h4"/></svg> 위치 확인 중...';
  
  if(!navigator.geolocation){
    btn.classList.remove('loading');
    btn.innerHTML='위치 서비스를 지원하지 않습니다';
    return;
  }
  
  navigator.geolocation.getCurrentPosition(pos=>{
    userLat=pos.coords.latitude;
    userLng=pos.coords.longitude;
    
    // 가장 가까운 노포 찾기
    let closest=null,minDist=Infinity;
    S.forEach(s=>{
      const d=haversine(userLat,userLng,s.lt,s.ln);
      if(d<minDist){minDist=d;closest=s}
    });
    
    // 발견 순간!
    const disc=document.getElementById('discovery');
    const text=document.getElementById('discoveryText');
    const dist=distStr(minDist);
    const walk=walkMin(minDist);
    
    text.innerHTML=`여기서 <strong>${dist} (도보 ${walk}분)</strong> 거리에<br><strong>${closest.y}년부터 ${closest.yr}년째</strong> 같은 자리!<br>「${closest.n}」 — ${closest.c}`;
    disc.classList.add('show');
    
    btn.classList.remove('loading');
    btn.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0116 0z"/><circle cx="12" cy="10" r="3"/></svg> 위치 연동 완료!';
    btn.style.background='var(--accent-dark)';
    
    // 거리순 정렬로 변경
    document.getElementById('sortSelect').value='distance';
    renderStores();
    
    // 결과로 스크롤
    setTimeout(()=>{
      document.getElementById('filters').scrollIntoView({behavior:'smooth'});
    },800);
    
  },err=>{
    btn.classList.remove('loading');
    btn.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 2v4m0 12v4M2 12h4m12 0h4"/></svg> 위치를 허용해주세요';
    setTimeout(()=>{
      btn.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 2v4m0 12v4M2 12h4m12 0h4"/></svg> 내 위치에서 가까운 노포 찾기';
    },2000);
  },{enableHighAccuracy:true,timeout:10000});
}

function getFiltered(){
  let list=[...S];
  if(activeDong!=='전체')list=list.filter(s=>s.d===activeDong);
  if(activeCat!=='전체'){
    if(activeCat==='기타'){
      const mainCats=['한식','분식','중식','일식','경양식','치킨','호프/치킨','고기','횟집','주점','카페'];
      list=list.filter(s=>!mainCats.includes(s.c));
    }else{
      list=list.filter(s=>s.c===activeCat);
    }
  }
  if(searchQuery){
    const q=searchQuery.toLowerCase();
    list=list.filter(s=>s.n.toLowerCase().includes(q)||s.c.includes(q)||s.d.includes(q)||s.a.toLowerCase().includes(q));
  }
  
  // Add distance
  if(userLat){
    list.forEach(s=>{s._dist=haversine(userLat,userLng,s.lt,s.ln)});
  }
  
  // Sort
  const sort=document.getElementById('sortSelect').value;
  if(sort==='years')list.sort((a,b)=>a.y-b.y);
  else if(sort==='name')list.sort((a,b)=>a.n.localeCompare(b.n,'ko'));
  else if(sort==='distance'&&userLat)list.sort((a,b)=>a._dist-b._dist);
  
  return list;
}

function renderStores(){
  const list=getFiltered();
  const container=document.getElementById('storeList');
  document.getElementById('resultCount').textContent=list.length;
  
  if(!list.length){
    container.innerHTML='<div class="empty"><div class="empty-icon">🍜</div><div class="empty-text">조건에 맞는 노포가 없습니다<br>필터를 변경해보세요</div></div>';
    return;
  }
  
  // Render cards (lazy — first 30, then load more on scroll)
  const show=list.slice(0,30);
  let html='';
  show.forEach((s,i)=>{
    const distHtml=userLat?`<div class="store-distance show"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>${distStr(s._dist)} · 도보 ${walkMin(s._dist)}분</div>`:'';
    const naverUrl=`https://map.naver.com/v5/search/${encodeURIComponent(s.n+' '+s.a.split('(')[0].trim())}`;
    const kakaoUrl=`https://map.kakao.com/?q=${encodeURIComponent(s.n+' 강서구')}`;
    const shareText=`${s.y}년부터 ${s.yr}년째! 강서구 노포「${s.n}」(${s.c}) — 오래 살아남은 맛이 강한 맛이다`;
    
    html+=`<div class="store-card card-enter" style="animation-delay:${Math.min(i*0.04,0.6)}s">
  <div class="store-card-top">
    <div class="store-name">${s.n}</div>
    <div class="store-years">${s.yr}년</div>
  </div>
  <div class="store-meta">
    <div class="store-meta-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3h7v7H3zm11 0h7v7h-7zm0 11h7v7h-7zM3 14h7v7H3z"/></svg>${s.c}</div>
    <div class="store-meta-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>${s.d}</div>
    ${s.p?`<div class="store-meta-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 01-2.18 2A19.86 19.86 0 013.09 5.18 2 2 0 015.11 3h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L8.59 11.4a16 16 0 006.01 6.01l1.77-1.77a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/></svg>${s.p}</div>`:``}
  </div>
  <div class="store-since">${s.y}년 개업 · ${s.a.split(',')[0].replace('서울특별시 강서구 ','')}</div>
  ${distHtml}
  <div class="store-actions">
    <a class="store-action-btn primary" href="${naverUrl}" target="_blank" rel="noopener">네이버 지도</a>
    <a class="store-action-btn" href="${kakaoUrl}" target="_blank" rel="noopener">카카오맵</a>
    <button class="store-action-btn" onclick="shareStore(event,'${shareText.replace(/'/g,"\\'")}')">공유</button>
  </div>
</div>`;
  });
  
  container.innerHTML=html;
  
  // Load more on scroll
  if(list.length>30){
    window._remainingStores=list.slice(30);
    window._loadMoreObserver&&window._loadMoreObserver.disconnect();
    const sentinel=document.createElement('div');
    sentinel.id='loadMore';
    sentinel.style.height='1px';
    container.appendChild(sentinel);
    window._loadMoreObserver=new IntersectionObserver(entries=>{
      if(entries[0].isIntersecting&&window._remainingStores.length){
        const next=window._remainingStores.splice(0,20);
        const s=document.getElementById('loadMore');
        next.forEach(store=>{
          const div=document.createElement('div');
          div.innerHTML=buildCard(store);
          s.parentNode.insertBefore(div.firstElementChild,s);
        });
      }
    });
    window._loadMoreObserver.observe(sentinel);
  }
}

function buildCard(s){
  const distHtml=userLat?`<div class="store-distance show"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>${distStr(s._dist)} · 도보 ${walkMin(s._dist)}분</div>`:'';
  const naverUrl=`https://map.naver.com/v5/search/${encodeURIComponent(s.n+' '+s.a.split('(')[0].trim())}`;
  const kakaoUrl=`https://map.kakao.com/?q=${encodeURIComponent(s.n+' 강서구')}`;
  return `<div class="store-card">
  <div class="store-card-top"><div class="store-name">${s.n}</div><div class="store-years">${s.yr}년</div></div>
  <div class="store-meta">
    <div class="store-meta-item">${s.c}</div>
    <div class="store-meta-item">${s.d}</div>
    ${s.p?`<div class="store-meta-item">${s.p}</div>`:''}
  </div>
  <div class="store-since">${s.y}년 개업 · ${s.a.split(',')[0].replace('서울특별시 강서구 ','')}</div>
  ${distHtml}
  <div class="store-actions">
    <a class="store-action-btn primary" href="${naverUrl}" target="_blank">네이버 지도</a>
    <a class="store-action-btn" href="${kakaoUrl}" target="_blank">카카오맵</a>
  </div>
</div>`;
}

function shareStore(e,text){
  e.stopPropagation();
  if(navigator.share){
    navigator.share({title:'강서구 노포 맛집',text:text,url:window.location.href}).catch(()=>{});
  }else{
    navigator.clipboard.writeText(text).then(()=>{
      const btn=e.target;
      btn.textContent='복사됨!';
      setTimeout(()=>btn.textContent='공유',1500);
    });
  }
}

// Search
document.getElementById('searchInput').addEventListener('input',e=>{
  searchQuery=e.target.value.trim();
  renderStores();
});

// Scroll effects
window.addEventListener('scroll',()=>{
  const f=document.getElementById('filters');
  const st=document.getElementById('scrollTop');
  f.classList.toggle('scrolled',window.scrollY>200);
  st.classList.toggle('show',window.scrollY>500);
});

// Spin animation
const style=document.createElement('style');
style.textContent='@keyframes spin{to{transform:rotate(360deg)}}';
document.head.appendChild(style);

// Init
initFilters();
renderStores();
document.getElementById('stat-total').textContent=S.length;
</script>
