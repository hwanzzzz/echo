<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="에코">
<meta name="theme-color" content="#0a0a0a">
<title>에코</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;500;600;700&family=Noto+Sans+KR:wght@300;400;500&family=JetBrains+Mono:wght@300;400&display=swap');

  :root {
    --bg: #0a0a0a;
    --surface: #141414;
    --surface-2: #1a1a1a;
    --surface-3: #222222;
    --text: #e8e4df;
    --text-dim: #8a857e;
    --text-faint: #5a5650;
    --accent: #c4a882;
    --accent-dim: rgba(196, 168, 130, 0.15);
    --accent-glow: rgba(196, 168, 130, 0.08);
    --danger: #c47070;
    --success: #82a882;
    --font-serif: 'Noto Serif KR', serif;
    --font-sans: 'Noto Sans KR', sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-sans);
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  #app {
    height: 100%;
    display: flex;
    flex-direction: column;
    max-width: 480px;
    margin: 0 auto;
    position: relative;
  }

  .screen {
    display: none;
    flex-direction: column;
    height: 100%;
    opacity: 0;
    transition: opacity 0.5s ease;
  }
  .screen.active { display: flex; opacity: 1; }

  /* ── Splash ── */
  #splash { justify-content: center; align-items: center; gap: 20px; }
  #splash .logo {
    font-family: var(--font-serif); font-size: 48px; font-weight: 300;
    letter-spacing: 8px; color: var(--accent); text-transform: uppercase;
  }
  #splash .tagline {
    font-size: 13px; color: var(--text-dim); letter-spacing: 2px; font-weight: 300;
  }
  #splash .start-btn {
    margin-top: 60px; padding: 14px 48px; background: transparent;
    border: 1px solid var(--accent); color: var(--accent);
    font-family: var(--font-sans); font-size: 14px; font-weight: 400;
    letter-spacing: 3px; cursor: pointer; transition: all 0.3s ease;
  }
  #splash .start-btn:active { background: var(--accent); color: var(--bg); }

  /* ── Question Screen ── */
  #question-screen { padding: 0 28px; padding-top: env(safe-area-inset-top, 60px); }
  .top-bar {
    display: flex; justify-content: space-between; align-items: center; padding: 20px 0 16px;
  }
  .top-bar .date {
    font-family: var(--font-mono); font-size: 11px; color: var(--text-faint); letter-spacing: 1px;
  }
  .top-bar .streak {
    font-family: var(--font-mono); font-size: 11px; color: var(--accent); letter-spacing: 1px;
  }
  .question-area {
    flex: 1; display: flex; flex-direction: column; justify-content: center; padding-bottom: 80px;
  }
  .question-label {
    font-family: var(--font-mono); font-size: 10px; color: var(--text-faint);
    letter-spacing: 3px; text-transform: uppercase; margin-bottom: 24px;
  }
  .question-text {
    font-family: var(--font-serif); font-size: 22px; font-weight: 300;
    line-height: 1.7; color: var(--text); letter-spacing: -0.3px;
  }
  .begin-writing {
    margin-top: 48px; padding: 16px 0; background: transparent;
    border: 1px solid var(--surface-3); color: var(--text-dim);
    font-family: var(--font-sans); font-size: 13px; font-weight: 400;
    letter-spacing: 2px; cursor: pointer; transition: all 0.3s ease; width: 100%;
  }
  .begin-writing:active { border-color: var(--accent); color: var(--accent); }
  .bottom-nav {
    display: flex; justify-content: space-between; align-items: center;
    padding: 12px 0; padding-bottom: env(safe-area-inset-bottom, 16px);
  }
  .nav-btn {
    font-size: 11px; color: var(--text-faint); background: none; border: none;
    cursor: pointer; font-family: var(--font-sans); letter-spacing: 1px;
    padding: 8px 4px; transition: color 0.3s;
  }
  .nav-btn:active { color: var(--accent); }

  /* ── Writing Screen ── */
  #writing-screen { padding: 0 28px; padding-top: env(safe-area-inset-top, 60px); }
  .writing-header {
    display: flex; justify-content: space-between; align-items: center; padding: 20px 0 12px;
  }
  .timer-bar {
    height: 2px; background: var(--surface-3); margin-bottom: 20px;
    border-radius: 1px; overflow: hidden;
  }
  .timer-fill {
    height: 100%; background: var(--accent); width: 100%;
    transition: width 0.1s linear; border-radius: 1px;
  }
  .timer-fill.warning { background: var(--danger); animation: pulse-bar 0.5s ease infinite; }
  @keyframes pulse-bar { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
  .writing-question-mini {
    font-family: var(--font-serif); font-size: 14px; color: var(--text-dim);
    line-height: 1.6; margin-bottom: 24px; font-weight: 300;
  }
  #editor {
    flex: 1; background: transparent; border: none; outline: none;
    color: var(--text); font-family: var(--font-serif); font-size: 17px;
    line-height: 1.9; font-weight: 300; resize: none; width: 100%;
    caret-color: var(--accent); letter-spacing: 0.2px;
  }
  #editor::placeholder { color: var(--text-faint); font-style: italic; }
  .writing-footer {
    padding: 16px 0; padding-bottom: env(safe-area-inset-bottom, 16px);
    display: flex; justify-content: space-between; align-items: center;
  }
  .char-count { font-family: var(--font-mono); font-size: 11px; color: var(--text-faint); }
  .timer-text {
    font-family: var(--font-mono); font-size: 11px; color: var(--text-faint); transition: color 0.3s;
  }
  .timer-text.warning { color: var(--danger); }

  /* ── Loading ── */
  #loading-screen { justify-content: center; align-items: center; gap: 24px; }
  .loading-dots { display: flex; gap: 8px; }
  .loading-dots span {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--accent); animation: dot-pulse 1.2s ease infinite;
  }
  .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
  .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes dot-pulse {
    0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); }
    40% { opacity: 1; transform: scale(1); }
  }
  .loading-text { font-size: 13px; color: var(--text-dim); letter-spacing: 1px; }

  /* ── Feedback ── */
  #feedback-screen {
    padding: 0 28px; padding-top: env(safe-area-inset-top, 60px);
    overflow-y: auto; -webkit-overflow-scrolling: touch;
  }
  .feedback-header {
    padding: 20px 0 24px; display: flex; justify-content: space-between; align-items: center;
  }
  .feedback-label {
    font-family: var(--font-mono); font-size: 10px; color: var(--text-faint);
    letter-spacing: 3px; text-transform: uppercase;
  }
  .feedback-section { margin-bottom: 32px; }
  .feedback-section-title {
    font-family: var(--font-mono); font-size: 10px; color: var(--accent);
    letter-spacing: 2px; text-transform: uppercase; margin-bottom: 12px;
  }
  .score-display { display: flex; align-items: baseline; gap: 8px; margin-bottom: 20px; }
  .score-number { font-family: var(--font-serif); font-size: 56px; font-weight: 300; color: var(--accent); }
  .score-max { font-family: var(--font-mono); font-size: 13px; color: var(--text-faint); }
  .score-bar-container { display: flex; gap: 3px; margin-bottom: 8px; }
  .score-bar-segment { flex: 1; height: 3px; background: var(--surface-3); border-radius: 1px; }
  .score-bar-segment.filled { background: var(--accent); }
  .score-dimensions { display: flex; flex-direction: column; gap: 6px; margin-top: 16px; }
  .dimension-row { display: flex; justify-content: space-between; align-items: center; }
  .dimension-label { font-size: 12px; color: var(--text-dim); }
  .dimension-score { font-family: var(--font-mono); font-size: 12px; color: var(--text); }
  .feedback-body {
    font-family: var(--font-serif); font-size: 15px; line-height: 1.8;
    color: var(--text-dim); font-weight: 300;
  }
  .refined-text {
    font-family: var(--font-serif); font-size: 16px; line-height: 1.9;
    color: var(--text); font-weight: 300; padding: 20px;
    background: var(--surface); border-left: 2px solid var(--accent); margin-top: 8px;
  }
  .original-text {
    font-family: var(--font-serif); font-size: 13px; line-height: 1.8;
    color: var(--text-faint); font-weight: 300; padding: 16px;
    background: var(--surface); margin-top: 8px; white-space: pre-wrap;
  }
  .done-btn {
    width: 100%; padding: 16px; background: transparent;
    border: 1px solid var(--surface-3); color: var(--text-dim);
    font-family: var(--font-sans); font-size: 13px; letter-spacing: 2px;
    cursor: pointer; margin: 32px 0;
    margin-bottom: calc(32px + env(safe-area-inset-bottom, 16px));
    transition: all 0.3s;
  }
  .done-btn:active { border-color: var(--accent); color: var(--accent); }

  /* ── Completed ── */
  #completed-screen {
    justify-content: center; align-items: center; gap: 16px; padding: 0 28px;
  }
  .completed-icon {
    width: 48px; height: 48px; border-radius: 50%;
    border: 1px solid var(--accent-dim); display: flex;
    align-items: center; justify-content: center; color: var(--accent);
    font-size: 20px; margin-bottom: 8px;
  }
  .completed-title { font-family: var(--font-serif); font-size: 24px; font-weight: 300; }
  .completed-sub { font-size: 13px; color: var(--text-dim); text-align: center; line-height: 1.7; }
  .next-time { font-family: var(--font-mono); font-size: 12px; color: var(--text-faint); margin-top: 24px; letter-spacing: 1px; }
  .completed-actions { display: flex; gap: 12px; margin-top: 32px; flex-wrap: wrap; justify-content: center; }
  .review-btn {
    padding: 14px 32px; background: transparent; border: 1px solid var(--surface-3);
    color: var(--text-dim); font-family: var(--font-sans); font-size: 13px;
    letter-spacing: 2px; cursor: pointer; transition: all 0.3s;
  }
  .review-btn:active { border-color: var(--accent); color: var(--accent); }
  .weekly-btn {
    padding: 14px 32px; background: transparent; border: 1px solid var(--accent-dim);
    color: var(--accent); font-family: var(--font-sans); font-size: 13px;
    letter-spacing: 1px; cursor: pointer; transition: all 0.3s; opacity: 0.7;
  }
  .weekly-btn:active { opacity: 1; }
  .weekly-btn:disabled { opacity: 0.3; cursor: default; }

  /* ── History ── */
  #history-screen {
    padding: 0 28px; padding-top: env(safe-area-inset-top, 60px);
    overflow-y: auto; -webkit-overflow-scrolling: touch;
  }
  .history-header {
    padding: 20px 0 24px; display: flex; justify-content: space-between; align-items: center;
  }
  .history-title { font-family: var(--font-serif); font-size: 20px; font-weight: 300; }
  .back-btn {
    font-size: 13px; color: var(--text-dim); background: none; border: none;
    cursor: pointer; font-family: var(--font-sans); letter-spacing: 1px;
  }
  .history-entry { padding: 20px 0; border-bottom: 1px solid var(--surface-2); cursor: pointer; }
  .history-entry:active { background: var(--surface); }
  .history-date { font-family: var(--font-mono); font-size: 10px; color: var(--text-faint); letter-spacing: 1px; margin-bottom: 8px; }
  .history-question { font-family: var(--font-serif); font-size: 14px; color: var(--text-dim); line-height: 1.6; margin-bottom: 8px; }
  .history-score { font-family: var(--font-mono); font-size: 12px; color: var(--accent); }
  .history-empty { text-align: center; padding: 60px 0; color: var(--text-faint); font-size: 13px; }
  .history-actions {
    display: flex; gap: 8px; padding: 16px 0;
    padding-bottom: env(safe-area-inset-bottom, 16px);
    border-top: 1px solid var(--surface-2); margin-top: 8px;
  }
  .history-action-btn {
    flex: 1; padding: 12px; background: transparent; border: 1px solid var(--surface-3);
    color: var(--text-faint); font-family: var(--font-sans); font-size: 11px;
    letter-spacing: 1px; cursor: pointer; transition: all 0.3s; text-align: center;
  }
  .history-action-btn:active { border-color: var(--accent); color: var(--accent); }

  /* ── History Detail ── */
  #detail-screen {
    padding: 0 28px; padding-top: env(safe-area-inset-top, 60px);
    overflow-y: auto; -webkit-overflow-scrolling: touch;
  }

  /* ── Weekly Review ── */
  #weekly-screen {
    padding: 0 28px; padding-top: env(safe-area-inset-top, 60px);
    overflow-y: auto; -webkit-overflow-scrolling: touch;
  }
  .weekly-header {
    padding: 20px 0 24px; display: flex; justify-content: space-between; align-items: center;
  }
  .weekly-content {
    font-family: var(--font-serif); font-size: 15px; line-height: 1.9;
    color: var(--text-dim); font-weight: 300; padding-bottom: 40px;
  }
  .weekly-content p { margin-bottom: 16px; }

  /* ── Settings ── */
  .settings-overlay {
    display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.85); z-index: 100; justify-content: center; align-items: center;
  }
  .settings-overlay.active { display: flex; }
  .settings-card {
    background: var(--surface); padding: 32px 28px; width: 90%; max-width: 400px; border-radius: 2px;
  }
  .settings-title { font-family: var(--font-serif); font-size: 18px; font-weight: 300; margin-bottom: 24px; }
  .settings-field { margin-bottom: 20px; }
  .settings-field label {
    display: block; font-size: 11px; color: var(--text-dim);
    letter-spacing: 1px; margin-bottom: 8px; font-family: var(--font-mono);
  }
  .settings-field textarea {
    width: 100%; padding: 12px; background: var(--surface-2);
    border: 1px solid var(--surface-3); color: var(--text);
    font-family: var(--font-sans); font-size: 14px; line-height: 1.6;
    resize: vertical; min-height: 80px; outline: none;
  }
  .settings-field textarea:focus { border-color: var(--accent); }
  .settings-actions { display: flex; gap: 12px; margin-top: 8px; }
  .settings-actions button {
    flex: 1; padding: 12px; font-family: var(--font-sans); font-size: 13px;
    letter-spacing: 1px; cursor: pointer; border: 1px solid var(--surface-3);
    background: transparent; color: var(--text-dim); transition: all 0.3s;
  }
  .settings-actions button.primary { border-color: var(--accent); color: var(--accent); }
  .settings-actions button:active { opacity: 0.7; }

  /* ── Toast ── */
  .toast {
    position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
    background: var(--surface-2); border: 1px solid var(--surface-3);
    color: var(--text-dim); padding: 12px 24px; font-size: 13px;
    font-family: var(--font-sans); z-index: 200; opacity: 0;
    transition: opacity 0.3s; pointer-events: none; white-space: nowrap;
  }
  .toast.show { opacity: 1; }

  /* Hidden file input */
  #import-input { display: none; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .fade-up { animation: fadeUp 0.6s ease forwards; }
  .fade-up-delay-1 { animation-delay: 0.15s; opacity: 0; }
  .fade-up-delay-2 { animation-delay: 0.3s; opacity: 0; }
  .fade-up-delay-3 { animation-delay: 0.45s; opacity: 0; }
</style>
</head>
<body>
<div id="app">

  <!-- Splash -->
  <div id="splash" class="screen active">
    <div class="logo fade-up">에코</div>
    <div class="tagline fade-up fade-up-delay-1">매일 하나의 질문, 앞으로만</div>
    <button class="start-btn fade-up fade-up-delay-2" onclick="startApp()">시작하기</button>
  </div>

  <!-- Question -->
  <div id="question-screen" class="screen">
    <div class="top-bar">
      <span class="date" id="today-date"></span>
      <span class="streak" id="streak-display"></span>
    </div>
    <div class="question-area">
      <div class="question-label fade-up">오늘의 질문</div>
      <div class="question-text fade-up fade-up-delay-1" id="question-display"></div>
      <button class="begin-writing fade-up fade-up-delay-2" onclick="goToWriting()">쓰기 시작</button>
    </div>
    <div class="bottom-nav">
      <button class="nav-btn" onclick="showSettings()">⚙ 설정</button>
      <button class="nav-btn" onclick="showHistory()">기록 보기</button>
    </div>
  </div>

  <!-- Writing -->
  <div id="writing-screen" class="screen">
    <div class="writing-header">
      <span class="timer-text" id="timer-display">10초</span>
      <span class="char-count" id="char-count">0자</span>
    </div>
    <div class="timer-bar"><div class="timer-fill" id="timer-fill"></div></div>
    <div class="writing-question-mini" id="writing-question"></div>
    <textarea id="editor" placeholder="여기에 쓰세요. 지우지 마세요. 앞으로만."></textarea>
    <div class="writing-footer">
      <span style="font-size:11px;color:var(--text-faint)">타이핑 멈추면 10초 후 자동 제출</span>
    </div>
  </div>

  <!-- Loading -->
  <div id="loading-screen" class="screen">
    <div class="loading-dots"><span></span><span></span><span></span></div>
    <div class="loading-text" id="loading-msg">당신의 글을 읽고 있습니다</div>
  </div>

  <!-- Feedback -->
  <div id="feedback-screen" class="screen">
    <div class="feedback-header">
      <span class="feedback-label">에코의 피드백</span>
    </div>
    <div id="feedback-content"></div>
    <button class="done-btn" onclick="finishDay()">오늘 끝</button>
  </div>

  <!-- Completed -->
  <div id="completed-screen" class="screen">
    <div class="completed-icon">✓</div>
    <div class="completed-title">오늘의 에코 완료</div>
    <div class="completed-sub">내일 오전 7시에 새로운 질문이<br>기다리고 있을 거예요.</div>
    <div class="next-time" id="next-reset"></div>
    <div class="completed-actions">
      <button class="review-btn" onclick="showHistory()">지난 기록</button>
      <button class="weekly-btn" id="weekly-review-btn" onclick="generateWeeklyReview()">주간 회고</button>
    </div>
  </div>

  <!-- History -->
  <div id="history-screen" class="screen">
    <div class="history-header">
      <span class="history-title">기록</span>
      <button class="back-btn" onclick="goBack()">돌아가기</button>
    </div>
    <div id="history-list"></div>
    <div class="history-actions">
      <button class="history-action-btn" onclick="exportData()">내보내기</button>
      <button class="history-action-btn" onclick="document.getElementById('import-input').click()">가져오기</button>
    </div>
  </div>

  <!-- History Detail -->
  <div id="detail-screen" class="screen">
    <div class="feedback-header">
      <span class="feedback-label" id="detail-date"></span>
      <button class="back-btn" onclick="showHistory()">목록</button>
    </div>
    <div id="detail-content"></div>
    <div style="height:40px"></div>
  </div>

  <!-- Weekly Review -->
  <div id="weekly-screen" class="screen">
    <div class="weekly-header">
      <span class="feedback-label">주간 회고</span>
      <button class="back-btn" onclick="goBack()">돌아가기</button>
    </div>
    <div class="weekly-content" id="weekly-content"></div>
  </div>

  <!-- Settings -->
  <div class="settings-overlay" id="settings-overlay">
    <div class="settings-card">
      <div class="settings-title">나에 대한 맥락</div>
      <div class="settings-field">
        <label>AI가 더 좋은 질문과 피드백을 줄 수 있도록, 지금 삶에서 중요한 것들을 알려주세요</label>
        <textarea id="user-context" placeholder="예: 콘텐츠 마케터로 일하고 있고, 올해 목표는 북미 시장 진출. 최근 스키를 새 취미로 시작했고, 매일 성장하는 사람이 되고 싶다."></textarea>
      </div>
      <div class="settings-actions">
        <button onclick="closeSettings()">취소</button>
        <button class="primary" onclick="saveSettings()">저장</button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>
  <input type="file" id="import-input" accept=".json" onchange="importData(event)">
</div>

<script>
// ══════════════════════════════════════
// ── Storage Layer: IndexedDB + localStorage dual write ──
// ══════════════════════════════════════
const DB_NAME = 'echo_db';
const DB_VERSION = 1;
const STORE_NAME = 'app_state';
const LS_KEY = 'echo_app_data';

let db = null;

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = (e) => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains(STORE_NAME)) {
        db.createObjectStore(STORE_NAME);
      }
    };
    req.onsuccess = (e) => { db = e.target.result; resolve(db); };
    req.onerror = () => resolve(null); // Graceful fallback
  });
}

async function idbSet(key, value) {
  if (!db) return;
  return new Promise((resolve) => {
    try {
      const tx = db.transaction(STORE_NAME, 'readwrite');
      tx.objectStore(STORE_NAME).put(value, key);
      tx.oncomplete = () => resolve(true);
      tx.onerror = () => resolve(false);
    } catch(e) { resolve(false); }
  });
}

async function idbGet(key) {
  if (!db) return null;
  return new Promise((resolve) => {
    try {
      const tx = db.transaction(STORE_NAME, 'readonly');
      const req = tx.objectStore(STORE_NAME).get(key);
      req.onsuccess = () => resolve(req.result || null);
      req.onerror = () => resolve(null);
    } catch(e) { resolve(null); }
  });
}

// Dual write: always write to both
async function persistState() {
  const json = JSON.stringify(state);
  try { localStorage.setItem(LS_KEY, json); } catch(e) {}
  await idbSet('state', json);
}

// Load: try IndexedDB first (more durable), fallback to localStorage
async function loadPersistedState() {
  let data = null;
  // Try IndexedDB
  const idbData = await idbGet('state');
  if (idbData) {
    try { data = JSON.parse(idbData); } catch(e) {}
  }
  // Fallback to localStorage
  if (!data) {
    try {
      const lsData = localStorage.getItem(LS_KEY);
      if (lsData) data = JSON.parse(lsData);
    } catch(e) {}
  }
  // If one had data and the other didn't, sync them
  if (data) {
    state = { ...getDefaultState(), ...data };
    await persistState(); // Sync both stores
  }
  return state;
}

function getTodayKey() {
  const now = new Date();
  if (now.getHours() < RESET_HOUR) {
    const yesterday = new Date(now);
    yesterday.setDate(yesterday.getDate() - 1);
    return yesterday.toISOString().split('T')[0];
  }
  return now.toISOString().split('T')[0];
}

function formatDate(dateStr) {
  if (!dateStr) dateStr = new Date().toISOString().split('T')[0];
  const [y, m, d] = dateStr.split('-');
  const days = ['일', '월', '화', '수', '목', '금', '토'];
  const date = new Date(parseInt(y), parseInt(m)-1, parseInt(d));
  return `${y}.${m}.${d} ${days[date.getDay()]}`;
}

function getTodayQuestion() {
  const todayKey = getTodayKey();
  if (state.todayQuestion && state.todayQuestionDate === todayKey) {
    return state.todayQuestion;

  const seed = todayKey.replace(/-/g, '');
  const idx = parseInt(seed) % QUESTIONS.length;
  state.todayQuestion = QUESTIONS[idx];
  state.todayQuestionDate = todayKey;
  persistState();
  return state.todayQuestion;
}

async function getAIFeedback(question, writing) {
  try {
    const recentContext = buildRecentContext();
    const systemPrompt = `당신은 '에코'라는 저널링 앱의 AI 피드백 엔진입니다. 사용자가 매일 하나의 질문에 대해 자유롭게 쓴 글을 평가하고 피드백을 줍니다.

규칙:
1. 문법, 오타, 문장 구조는 절대 평가하지 마세요. 사용자는 백스페이스 없이 앞으로만 글을 쓰기 때문에 오타가 많습니다.
2. 오직 "사고의 깊이"와 "질문과의 관련성"만 평가하세요.
3. 점수는 1~10점. 두 차원:
   - 사고의 깊이 (1-10): 표면적 답변 vs 깊이 있는 성찰
   - 질문 관련성 (1-10): 질문의 핵심을 얼마나 잘 다뤘는지
4. 총점 = 두 차원의 평균 (반올림).
5. 피드백은 따뜻하지만 솔직하게. 잘한 점 + 더 깊이 파볼 수 있는 방향. 최근 기록과 연결되는 부분이 있으면 자연스럽게 언급해주세요 ("며칠 전 ~에 대해 쓰셨는데, 오늘은..." 식으로).
6. "다듬어진 버전": 오타투성이 글 속의 진짜 하고 싶었던 말을 깔끔한 문장으로 재구성. 원래 의미와 뉘앙스를 최대한 살리되, 읽기 좋은 글로.

${state.userContext ? `사용자 맥락: ${state.userContext}` : ''}${recentContext}

반드시 아래 JSON 형식으로만 응답하세요. 마크다운 코드블록 없이 순수 JSON만:
{"depth_score":숫자,"relevance_score":숫자,"total_score":숫자,"feedback":"텍스트","refined":"텍스트"}`;

    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        system: systemPrompt,
        messages: [{ role: "user", content: `질문: ${question}\n\n사용자의 글:\n${writing}` }]
      })
    });

    const data = await response.json();
    const text = data.content.map(c => c.text || '').join('');

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

async function startApp() {
  await openDB();
  await loadPersistedState();

  if (isCompletedToday()) {
    showScreen('completed-screen');
    updateCompletedScreen();
  } else {
    showScreen('question-screen');
    updateQuestionScreen();
  }
}

function updateQuestionScreen() {
  document.getElementById('today-date').textContent = formatDate(getTodayKey());
  document.getElementById('streak-display').textContent = state.streak > 0 ? `🔥 ${state.streak}일` : '';
  document.getElementById('question-display').textContent = getTodayQuestion();
}

function goToWriting() {
  showScreen('writing-screen');
  const editor = document.getElementById('editor');
  document.getElementById('writing-question').textContent = getTodayQuestion();
  editor.value = '';
  updateCharCount();
  editor.addEventListener('keydown', handleKeydown);
  editor.addEventListener('input', handleInput);
  setTimeout(() => editor.focus(), 100);
  resetIdleTimer();
}

function handleKeydown(e) {
  if (e.key === 'Backspace' || e.key === 'Delete') e.preventDefault();
}

function handleInput() {
  updateCharCount();
  resetIdleTimer();
}

function updateCharCount() {
  const len = document.getElementById('editor').value.length;
  document.getElementById('char-count').textContent = `${len}자`;
}

function resetIdleTimer() {
  idleRemaining = IDLE_SECONDS;
  clearInterval(idleInterval);
  const fill = document.getElementById('timer-fill');
  const timerText = document.getElementById('timer-display');
  fill.style.width = '100%';
  fill.classList.remove('warning');
  timerText.classList.remove('warning');
  timerText.textContent = `${IDLE_SECONDS}초`;

  idleInterval = setInterval(() => {
    idleRemaining--;
    fill.style.width = (idleRemaining / IDLE_SECONDS * 100) + '%';
    timerText.textContent = `${idleRemaining}초`;
    if (idleRemaining <= 3) { fill.classList.add('warning'); timerText.classList.add('warning'); }
    else { fill.classList.remove('warning'); timerText.classList.remove('warning'); }
    if (idleRemaining <= 0) { clearInterval(idleInterval); submitWriting(); }
  }, 1000);
}

async function submitWriting() {
  clearInterval(idleInterval);
  const editor = document.getElementById('editor');
  const writing = editor.value.trim();
  editor.removeEventListener('keydown', handleKeydown);
  editor.removeEventListener('input', handleInput);

  if (!writing) { showScreen('question-screen'); return; }

  showScreen('loading-screen');
  const question = getTodayQuestion();
  const feedback = await getAIFeedback(question, writing);

  const entry = { date: getTodayKey(), question, writing, feedback, timestamp: new Date().toISOString() };
  state.entries.unshift(entry);

  // Streak logic with 7am reset awareness
  const today = getTodayKey();
  const prevDate = new Date(today);
  prevDate.setDate(prevDate.getDate() - 1);
  const yesterdayKey = prevDate.toISOString().split('T')[0];

  if (state.lastCompletedDate === yesterdayKey) {
    state.streak++;
  } else if (state.lastCompletedDate !== today) {
    state.streak = 1;
  }
  state.lastCompletedDate = today;
  await persistState();

  renderFeedback(feedback, writing);
  showScreen('feedback-screen');
}

  ).join('');

  document.getElementById('feedback-content').innerHTML = `
    <div class="feedback-section fade-up">
      <div class="feedback-section-title">평가</div>

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function finishDay() {
  showScreen('completed-screen');

function updateCompletedScreen() {
  const now = new Date();
  let next = new Date(now);
  next.setHours(RESET_HOUR, 0, 0, 0);
  if (now >= next) next.setDate(next.getDate() + 1);
  const diff = next - now;
  const hours = Math.floor(diff / 3600000);
  const mins = Math.floor((diff % 3600000) / 60000);
  document.getElementById('next-reset').textContent = `다음 질문까지 ${hours}시간 ${mins}분`;

  // Enable weekly review button only if 3+ entries
  const btn = document.getElementById('weekly-review-btn');
  btn.disabled = state.entries.length < 3;
}

function exportData() {
  const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `echo_backup_${getTodayKey()}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('백업 파일이 다운로드됩니다');
}

function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = async (e) => {
    try {
      const imported = JSON.parse(e.target.result);
      if (!imported.entries || !Array.isArray(imported.entries)) throw new Error('Invalid');

      // Merge: add entries that don't exist by date+timestamp
      const existingKeys = new Set(state.entries.map(e => e.date + e.timestamp));
      let added = 0;
      for (const entry of imported.entries) {
        const key = entry.date + entry.timestamp;
        if (!existingKeys.has(key)) {
          state.entries.push(entry);
          added++;
        }
      }
      // Sort by date desc
      state.entries.sort((a, b) => b.date.localeCompare(a.date));
      // Take the higher streak
      if (imported.streak > state.streak) state.streak = imported.streak;
      if (imported.userContext && !state.userContext) state.userContext = imported.userContext;

      await persistState();
      showToast(`${added}개 기록 가져옴`);
      showHistory();
    } catch (err) {
      showToast('파일을 읽을 수 없습니다');
    }
    event.target.value = '';
  };
  reader.readAsText(file);
}

// ── Settings ──
function showSettings() {
  document.getElementById('user-context').value = state.userContext || '';
  document.getElementById('settings-overlay').classList.add('active');
}
function closeSettings() {
  document.getElementById('settings-overlay').classList.remove('active');
}
async function saveSettings() {
  state.userContext = document.getElementById('user-context').value.trim();
  await persistState();
  closeSettings();
  showToast('저장됨');
}

// ── Toast ──
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2000);
}

// ── Init ──
document.addEventListener('DOMContentLoaded', () => showScreen('splash'));
</script>
